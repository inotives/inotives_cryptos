services:
  # ── Core Database (TimescaleDB) ───────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: ${DB_CONTAINER_NAME}
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - inotives_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prefect Orchestration Server ──────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-python3.12
    container_name: inotives_prefect
    restart: always
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_SERVER_DATABASE_CONNECTION_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/prefect_internal
      - PREFECT_API_URL=http://localhost:4200/api
    ports:
      - "4200:4200"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Fetcher Worker (runs Prefect flows) ───────────────────────────────────
  fetcher-worker:
    build:
      context: apps/pipelines
      dockerfile: Dockerfile
    container_name: inotives_fetcher_worker
    restart: always
    command: prefect worker start --pool data-eng-pool --type process
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - COINMARKETCAP_API_KEY=${COINMARKETCAP_API_KEY}
    depends_on:
      prefect:
        condition: service_healthy

volumes:
  inotives_postgres_data:
